<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe AI - Neural Transcription</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Dynamic animated backgrounds -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="glass-container">
        <header>
            <div class="logo">
                <span class="icon">⚡</span>
                <span class="brand">Scribe</span>
            </div>
            <h1>Neural Audio Transcription</h1>
            <p>Powered by OpenAI Whisper technology</p>
        </header>

        <section id="drop-zone" class="drop-zone">
            <input type="file" id="audio" accept="audio/*,video/*">
            <div class="drop-content">
                <div class="upload-icon">🎧</div>
                <h3>Upload Media</h3>
                <p>Drag and drop your audio or video file here, or click to browse.</p>
                <span class="supported-formats">Supports MP3, WAV, M4A, MP4 & more</span>
            </div>
        </section>

        <!-- Status & Loading Animation Container -->
        <section id="status-container" class="status-container" style="display: none;">
            <div class="waves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
            <p id="status-message" class="status-message">Initializing Neural Net...</p>
        </section>

        <!-- Result Container -->
        <section id="result-container" class="result-container" style="display: none;">
            <div class="result-header">
                <h3>Transcription Ready</h3>
                <button id="copy-btn" class="icon-btn" title="Copy to clipboard">📋</button>
            </div>
            <textarea id="output" readonly></textarea>
            <button id="download-btn" class="primary-btn glow-effect">
                <span>Download Transcript</span>
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
